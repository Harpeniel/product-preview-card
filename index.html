<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <div class="card">
      <div class="card__img">
        <picture>
          <source
            media="(min-width: 500px)"
            srcset="./images/image-product-desktop.jpg"
            width="600"
            height="900"
          />
          <img
            src="./images/image-product-mobile.jpg"
            alt="perfume image"
            width="700"
            height="684"
          />
        </picture>
      </div>
      <div class="card__content">
        <p class="card__content__branding">Perfume</p>
        <h1 class="card__content__title">Gabrielle Essence Eau De Parfum</h1>
        <p class="card__content__description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="card__content__price">
          <span>$149.99</span>
          <span>$169.99</span>
        </div>
        <a href="#" class="button"> Add to Cart </a>
      </div>
    </div>
  </body>
</html>
